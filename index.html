<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NominPro 2026 | La Calculadora Salarial Definitiva</title>
    <meta name="description" content="Calcula tu sueldo neto y finiquito en España (Actualizado 2026). Incluye tramos autonómicos, topes legales y descarga en PDF.">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

    <style>
        /* VARIABLES CLARO / OSCURO */
        :root[data-theme="light"] { 
            --primary: #6366f1; --primary-hover: #4f46e5; --success: #10b981; 
            --bg: #f3f4f6; --card-bg: #ffffff; --text-main: #111827; --text-muted: #6b7280;
            --border: #e5e7eb; --input-bg: #f9fafb;
        }
        :root[data-theme="dark"] { 
            --primary: #818cf8; --primary-hover: #6366f1; --success: #34d399; 
            --bg: #111827; --card-bg: #1f2937; --text-main: #f9fafb; --text-muted: #9ca3af;
            --border: #374151; --input-bg: #374151;
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text-main); margin: 0; padding: 0; }

        /* HEADER & THEME TOGGLE */
        header { background: var(--card-bg); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .logo-text { font-weight: 900; font-size: 1.5rem; color: var(--primary); letter-spacing: -0.5px; }
        .theme-btn { background: var(--border); border: none; padding: 8px 12px; border-radius: 20px; cursor: pointer; color: var(--text-main); font-weight: bold; font-size: 0.9rem; }

        .container { max-width: 1050px; margin: 2rem auto; padding: 0 15px; }
        
        /* CARD PRINCIPAL */
        .main-card { background: var(--card-bg); border-radius: 20px; padding: 2rem; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 2rem; background: var(--input-bg); padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; color: var(--text-muted); background: transparent; }
        .tab-btn.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* FORMULARIO */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; }
        label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 0.9rem; color: var(--text-main); }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; background: var(--input-bg); color: var(--text-main); outline: none; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }

        .btn-calc { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 10px; font-size: 1.1rem; font-weight: 900; cursor: pointer; margin-top: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-calc:hover { background: var(--primary-hover); transform: scale(0.99); }

        /* RESULTADOS Y PDF */
        .dashboard { margin-top: 2rem; display: none; grid-template-columns: 1fr 1fr; gap: 2rem; padding-top: 2rem; border-top: 1px solid var(--border); }
        .stat-card { background: var(--input-bg); border-radius: 16px; padding: 1.5rem; text-align: center; border: 1px solid var(--border); }
        .stat-val { font-size: 2.5rem; font-weight: 900; color: var(--success); }
        
        .btn-pdf { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; margin: 15px auto 0; }
        .btn-pdf:hover { background: #dc2626; }

        /* COOKIES BANNER */
        .cookie-banner { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); border-top: 1px solid var(--border); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .cookie-btn { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } .cookie-banner { flex-direction: column; gap: 10px; text-align: center; } }
        
        /* Contenedor a exportar en PDF */
        #pdf-content { padding: 10px; background: var(--card-bg); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo-text">NominPro <span style="color:var(--text-main); font-weight:300;">2026</span></div>
    <button class="theme-btn" onclick="toggleTheme()">🌓 Modo Noche</button>
</header>

<div class="container">
    <div class="main-card">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('sueldo', this)">💰 Sueldo Neto</button>
            <button class="tab-btn" onclick="switchTab('finiquito', this)">⚖️ Finiquito (Topes Legales)</button>
        </div>

        <div id="section-sueldo">
            <div class="form-grid">
                <div>
                    <label>Salario Bruto Anual (€)</label>
                    <input type="number" id="bruto" placeholder="Ej: 30000" oninput="saveData()">
                </div>
                <div>
                    <label>Comunidad Autónoma</label>
                    <select id="comunidad" onchange="saveData()">
                        <option value="madrid">Madrid</option>
                        <option value="cataluna">Cataluña</option>
                        <option value="andalucia">Andalucía</option>
                        <option value="comun">Resto de España</option>
                    </select>
                </div>
                <div>
                    <label>Pagas</label>
                    <select id="pagas" onchange="saveData()">
                        <option value="12">12 Pagas</option>
                        <option value="14">14 Pagas</option>
                    </select>
                </div>
                <div>
                    <label>Hijos a cargo</label>
                    <select id="hijos" onchange="saveData()">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2 o más</option>
                    </select>
                </div>
            </div>
            <button class="btn-calc" onclick="calcularSueldo()">Analizar Nómina</button>
        </div>

        <div id="section-finiquito" style="display:none">
            <div class="form-grid">
                <div>
                    <label>Salario Mensual (Con prorratas)</label>
                    <input type="number" id="mensual" placeholder="Ej: 2000" oninput="saveData()">
                </div>
                <div>
                    <label>Años trabajados</label>
                    <input type="number" id="antiguedad" placeholder="Ej: 3.5" step="0.1" oninput="saveData()">
                </div>
                <div>
                    <label>Causa del Despido</label>
                    <select id="motivo" onchange="saveData()">
                        <option value="33">Improcedente (33 días, máx 24 meses)</option>
                        <option value="20">Objetivo (20 días, máx 12 meses)</option>
                        <option value="0">Baja Voluntaria (Sin indemnización)</option>
                    </select>
                </div>
            </div>
            <button class="btn-calc" onclick="calcularFiniquito()">Calcular con Topes</button>
        </div>

        <div id="results-dash" class="dashboard">
            <div id="pdf-content">
                <div style="margin-bottom: 15px; font-weight: bold; color: var(--primary);">REPORTE OFICIAL NOMINPRO</div>
                <div class="stat-card">
                    <div style="font-size: 0.9rem; font-weight: bold; color: var(--text-muted); text-transform: uppercase;" id="result-title">Sueldo Neto Anual</div>
                    <div id="main-result" class="stat-val">0,00 €</div>
                    <div id="secondary-result" style="margin-top: 5px; font-weight: bold; color: var(--text-main);"></div>
                </div>
                <div style="margin-top: 20px;">
                    <div style="display:flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px;">
                        <span>Impuestos (IRPF)</span> <span id="label-irpf" style="font-weight:700">0 €</span>
                    </div>
                    <div style="display:flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 5px;">
                        <span>Seguridad Social</span> <span id="label-ss" style="font-weight:700">0 €</span>
                    </div>
                </div>
                <button class="btn-pdf" onclick="descargarPDF()" data-html2canvas-ignore>
                    📄 Descargar Informe en PDF
                </button>
            </div>
            <div>
                <div style="position: relative; height: 250px; width: 100%;">
                    <canvas id="salaryChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="cookie-banner" id="cookieBanner">
    <div style="font-size: 0.9rem;">
        Usamos cookies para asegurar que te damos la mejor experiencia en nuestra web y mostrar anuncios relevantes (Google AdSense). Al continuar, aceptas nuestra política.
    </div>
    <button class="cookie-btn" onclick="aceptarCookies()">Aceptar y Cerrar</button>
</div>

<script>
    // 1. SISTEMA DE MEMORIA (LocalStorage)
    window.onload = function() {
        if(localStorage.getItem('nominpro_bruto')) document.getElementById('bruto').value = localStorage.getItem('nominpro_bruto');
        if(localStorage.getItem('nominpro_comunidad')) document.getElementById('comunidad').value = localStorage.getItem('nominpro_comunidad');
        if(localStorage.getItem('nominpro_mensual')) document.getElementById('mensual').value = localStorage.getItem('nominpro_mensual');
        if(localStorage.getItem('nominpro_theme')) document.documentElement.setAttribute('data-theme', localStorage.getItem('nominpro_theme'));
        if(localStorage.getItem('nominpro_cookies') === 'aceptadas') document.getElementById('cookieBanner').style.display = 'none';
    };

    function saveData() {
        localStorage.setItem('nominpro_bruto', document.getElementById('bruto').value);
        localStorage.setItem('nominpro_comunidad', document.getElementById('comunidad').value);
        localStorage.setItem('nominpro_mensual', document.getElementById('mensual').value);
    }

    // 2. MODO OSCURO
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('nominpro_theme', newTheme);
        if(myChart) { myChart.options.plugins.legend.labels.color = newTheme === 'dark' ? '#fff' : '#000'; myChart.update(); }
    }

    // 3. AVISO DE COOKIES
    function aceptarCookies() {
        localStorage.setItem('nominpro_cookies', 'aceptadas');
        document.getElementById('cookieBanner').style.display = 'none';
    }

    // 4. PESTAÑAS Y GRÁFICOS
    let myChart = null;
    function switchTab(tab, btn) {
        document.getElementById('section-sueldo').style.display = tab === 'sueldo' ? 'block' : 'none';
        document.getElementById('section-finiquito').style.display = tab === 'finiquito' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('results-dash').style.display = 'none';
    }

    function updateChart(data1, data2, data3, label1, label2, label3) {
        const ctx = document.getElementById('salaryChart').getContext('2d');
        if (myChart) myChart.destroy();
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: [label1, label2, label3],
                datasets: [{
                    data: [data1, data2, data3],
                    backgroundColor: ['#10b981', '#ef4444', '#6366f1'],
                    borderWidth: 2,
                    borderColor: isDark ? '#1f2937' : '#ffffff'
                }]
            },
            options: { cutout: '65%', plugins: { legend: { position: 'bottom', labels: { color: isDark ? '#fff' : '#000' } } } }
        });
    }

    // 5. LÓGICA DE SUELDO 2026
    function calcularSueldo() {
        const bruto = parseFloat(document.getElementById('bruto').value);
        const comunidad = document.getElementById('comunidad').value;
        const pagas = parseInt(document.getElementById('pagas').value);
        
        if (!bruto) return;

        const ss = bruto * 0.0645;
        let base = bruto - ss - 2000 - 5550; // Mínimo
        if (base < 0) base = 0;

        let tasaMod = comunidad === 'madrid' ? -0.01 : (comunidad === 'cataluna' ? 0.01 : 0);
        let irpf = base * (0.19 + tasaMod); 
        if (base > 12450) irpf = (12450 * (0.19 + tasaMod)) + ((base - 12450) * 0.24);
        if (base > 20200) irpf = (12450 * (0.19 + tasaMod)) + (7750 * 0.24) + ((base - 20200) * 0.30);
        if (irpf < 0) irpf = 0;

        const netoAnual = bruto - ss - irpf;
        
        document.getElementById('result-title').innerText = "Sueldo Neto Anual";
        document.getElementById('main-result').innerText = netoAnual.toLocaleString('es-ES', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " €";
        document.getElementById('secondary-result').innerText = (netoAnual/pagas).toLocaleString('es-ES', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " € / mes (" + pagas + " pagas)";
        document.getElementById('label-irpf').innerText = irpf.toLocaleString('es-ES', {maximumFractionDigits: 0}) + " €";
        document.getElementById('label-ss').innerText = ss.toLocaleString('es-ES', {maximumFractionDigits: 0}) + " €";
        
        document.getElementById('results-dash').style.display = 'grid';
        updateChart(netoAnual, irpf, ss, 'Neto', 'IRPF', 'SS');
    }

    // 6. LÓGICA DE FINIQUITO CON TOPES LEGALES
    function calcularFiniquito() {
        const mensual = parseFloat(document.getElementById('mensual').value);
        const ant = parseFloat(document.getElementById('antiguedad').value);
        const diasPorAno = parseInt(document.getElementById('motivo').value);

        if (!mensual || !ant) return;

        const salarioDia = (mensual * 12) / 365;
        let indemnizacion = salarioDia * diasPorAno * ant;

        // APLICACIÓN DE TOPES LEGALES EN ESPAÑA
        let topeMensualidades = diasPorAno === 33 ? 24 : (diasPorAno === 20 ? 12 : 0);
        let topeEuros = mensual * topeMensualidades;

        if (indemnizacion > topeEuros) indemnizacion = topeEuros;

        document.getElementById('result-title').innerText = "Indemnización Total Estimada";
        document.getElementById('main-result').innerText = indemnizacion.toLocaleString('es-ES', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " €";
        
        let avisoTope = indemnizacion === topeEuros && topeEuros > 0 ? " (Tope legal aplicado)" : "";
        document.getElementById('secondary-result').innerText = "Basado en " + diasPorAno + " días/año" + avisoTope;
        document.getElementById('label-irpf').innerText = "Exento de IRPF";
        document.getElementById('label-ss').innerText = "-";
        
        document.getElementById('results-dash').style.display = 'grid';
        updateChart(indemnizacion, 0, 0, 'Indemnización', '', '');
    }

    // 7. GENERACIÓN DE PDF REAL
    function descargarPDF() {
        const element = document.getElementById('pdf-content');
        const opt = {
            margin:       1,
            filename:     'Reporte_NominPro_2026.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
